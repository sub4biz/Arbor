name: ✨ Feature request / 功能请求
description: Suggest a new capability or an improvement. / 提议一个新功能或改进。
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem first, then the change you'd like — it helps us weigh trade-offs.
        感谢你的想法！请先描述要解决的问题，再说明期望的改动，便于我们权衡取舍。

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist / 提交前检查
      options:
        - label: I searched existing issues for a similar request. / 我已搜索现有 issue，没有类似请求。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation / 问题与动机
      description: What are you trying to do that's hard or impossible today? / 你想做什么，而当前难以实现或无法实现？
      placeholder: "I'm always frustrated when ... / 我在 ... 时总是遇到困难 ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / 期望方案
      description: What should Arbor do? Be as concrete as you can (CLI flags, config keys, behavior). / 你希望 Arbor 怎么做？尽量具体（CLI 参数、配置项、行为）。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 考虑过的替代方案
      description: Other approaches or workarounds you've tried or thought about. / 你尝试或考虑过的其他做法或临时方案。
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context / 补充信息
      description: Use cases, screenshots, links, or anything else that helps. / 使用场景、截图、链接或其他有帮助的信息。
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution / 贡献
      options:
        - label: I'm willing to open a PR to implement this. / 我愿意提交 PR 来实现它。
          required: false
